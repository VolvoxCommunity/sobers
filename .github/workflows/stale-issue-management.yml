name: Stale Issue Management
on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been inactive for 30 days. Please update or it will be closed in 7 days.'
          stale-pr-message: 'This PR has been inactive for 30 days. Please update or it will be closed in 7 days.'
          close-issue-message: 'Closing due to inactivity. Reopen if still needed.'
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'epic,in-progress,priority-high'
          exempt-pr-labels: 'in-review'
